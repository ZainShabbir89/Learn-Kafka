spring.application.name=User

# ===============================
# KAFKA COMMON PROPERTIES
# ===============================
# Connection to your KRaft server
spring.kafka.bootstrap-servers=localhost:9092

# ===============================
# CONSUMER SPECIFIC PROPERTIES
# ===============================
# Deserializers: Convert bytes from Kafka back to String
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Group ID: Tells Kafka which group this app belongs to.
# If you run multiple instances of 'User', Kafka will split the load between them.
spring.kafka.consumer.group-id=user-group

# 'earliest' ensures that if this is a new group, it reads all old messages.
# 'latest' would only read messages sent AFTER the app starts.
spring.kafka.consumer.auto-offset-reset=earliest

# Disable auto-commit if you want more control, but true is best for beginners.
spring.kafka.consumer.enable-auto-commit=true

# ===============================
# LISTENER PROPERTIES
# ===============================
# This helps Spring manage the background thread that listens for messages
spring.kafka.listener.missing-topics-fatal=false
