spring.application.name=Driver
server.port=8081

# ===============================
# KAFKA COMMON PROPERTIES
# ===============================
# The address of your running Kafka broker
spring.kafka.bootstrap-servers=localhost:9092

# ===============================
# PRODUCER PROPERTIES (Sending Data)
# ===============================
# StringSerializer converts your Java Strings into bytes for Kafka
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# 'acks=all' ensures the strongest guarantee that the message was received
spring.kafka.producer.acks=all

# ===============================
# CONSUMER PROPERTIES (Receiving Data)
# ===============================
# StringDeserializer converts bytes from Kafka back into Java Strings
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Group ID identifies which 'group' this consumer belongs to
spring.kafka.consumer.group-id=driver-group
# 'earliest' means start reading from the beginning if no offset is found
spring.kafka.consumer.auto-offset-reset=earliest

# ===============================
# ADDITIONAL SETTINGS
# ===============================
# Auto-create topics if they don't exist (useful for development)
spring.kafka.admin.auto-create=true
